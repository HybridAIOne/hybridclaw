name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version tag to publish (e.g. v1.2.3). Must match package.json.
          Leave empty to use the version from package.json.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  # Validate tag/package.json alignment once; both image jobs depend on this.
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      ref: ${{ steps.check.outputs.ref }}
      publish_dockerhub: ${{ steps.check.outputs.publish_dockerhub }}
      labels: ${{ steps.check.outputs.labels }}
      owner_lc: ${{ steps.check.outputs.owner_lc }}
      sha: ${{ steps.check.outputs.sha }}
      sha_short: ${{ steps.check.outputs.sha_short }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: Resolve target ref
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_VERSION}" ]]; then
            echo "ref=refs/tags/${INPUT_VERSION}" >> "${GITHUB_OUTPUT}"
          else
            echo "ref=${GITHUB_REF}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Validate tag and resolve shared metadata
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          EXPECTED_TAG="v$(jq -r .version package.json)"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${INPUT_VERSION:-${EXPECTED_TAG}}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Expected a v-prefixed release tag, got '${TAG}'." >&2
            exit 1
          fi

          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/package mismatch: tag '${TAG}' != package.json '${EXPECTED_TAG}'." >&2
            exit 1
          fi

          PUBLISH_DOCKERHUB=false
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            PUBLISH_DOCKERHUB=true
          fi
          PRERELEASE=false
          if [[ "${TAG}" == *-* ]]; then
            PRERELEASE=true
          fi
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHA="$(git rev-parse HEAD)"
          SHA_SHORT="${SHA::7}"

          {
            echo "tag=${TAG}"
            echo "ref=${{ steps.resolve.outputs.ref }}"
            echo "publish_dockerhub=${PUBLISH_DOCKERHUB}"
            echo "prerelease=${PRERELEASE}"
            echo "owner_lc=${OWNER_LC}"
            echo "sha=${SHA}"
            echo "sha_short=${SHA_SHORT}"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${SHA}"
            echo "org.opencontainers.image.version=${TAG}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  # Execution sandbox image — used inside sandboxes for code execution.
  publish-agent:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Require Docker Hub credentials for agent image publishing
        if: needs.validate.outputs.publish_dockerhub != 'true'
        shell: bash
        run: |
          echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are required to publish the hybridclaw-agent release image." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}

      - name: Resolve agent image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-agent"
          TAGS="${DOCKERHUB_IMAGE}:${TAG}"
          if [[ "${PRERELEASE}" != "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Promote agent image from main build
        id: promote
        uses: ./.github/actions/promote-image
        with:
          source: ghcr.io/${{ needs.validate.outputs.owner_lc }}/hybridclaw-agent:sha-${{ needs.validate.outputs.sha_short }}
          target-tags: ${{ steps.meta.outputs.tags }}

      - name: Build and push agent image
        if: steps.promote.outputs.promoted != 'true'
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./container
          target: runtime
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}
          cache-from: type=gha,scope=hybridclaw-agent
          cache-to: type=gha,mode=max,scope=hybridclaw-agent

      - name: Verify published agent tags
        uses: ./.github/actions/verify-published-tags
        with:
          tags: ${{ steps.meta.outputs.tags }}

  # Gateway image — runs as a permanent claw sandbox (hybridclaw gateway start).
  publish-gateway:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}

      - name: Resolve gateway image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          PUBLISH_DOCKERHUB: ${{ needs.validate.outputs.publish_dockerhub }}
          OWNER_LC: ${{ needs.validate.outputs.owner_lc }}
        run: |
          set -euo pipefail
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/hybridclaw-gateway"
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-gateway"
          TAGS="${GHCR_IMAGE}:${TAG}"
          if [[ "${PRERELEASE}" != "true" ]]; then
            TAGS="${TAGS}"$'\n'"${GHCR_IMAGE}:latest"
          fi
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:${TAG}"
            if [[ "${PRERELEASE}" != "true" ]]; then
              TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Promote gateway image from main build
        id: promote
        uses: ./.github/actions/promote-image
        with:
          source: ghcr.io/${{ needs.validate.outputs.owner_lc }}/hybridclaw-gateway:sha-${{ needs.validate.outputs.sha_short }}
          target-tags: ${{ steps.meta.outputs.tags }}

      - name: Build and push gateway image
        if: steps.promote.outputs.promoted != 'true'
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}
          cache-from: type=gha,scope=hybridclaw-gateway
          cache-to: type=gha,mode=max,scope=hybridclaw-gateway

      - name: Verify published gateway tags
        uses: ./.github/actions/verify-published-tags
        with:
          tags: ${{ steps.meta.outputs.tags }}

  # npm package — published to npmjs.com as @hybridaione/hybridclaw.
  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.validate.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # npm trusted publishing requires npm 11+, which GitHub-hosted Node 24
          # provides out of the box on the release runner image.
          node-version: 24
          cache: npm

      # Skip the slow install+prepack entirely on retries where a prior run
      # already reached `npm publish` but a later job failed — otherwise we'd
      # pay ~30–90s before npm's 403 ended the job.
      - name: Check if version already published
        id: preflight
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          NAME="$(jq -r .name package.json)"
          VERSION="$(jq -r .version package.json)"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published; skipping."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        if: steps.preflight.outputs.skip != 'true'
        run: npm ci

      - name: Build and verify pack contents
        if: steps.preflight.outputs.skip != 'true'
        run: npm run prepack

      - name: Publish to npm
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        env:
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          if [[ "${PRERELEASE}" == "true" ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          npm publish --access public --tag "${NPM_TAG}" --provenance

  # Consumers (e.g. the chat repo's image resolver) treat the GitHub Release
  # as the authoritative "image is pullable" signal; gate creation on all
  # publish jobs succeeding.
  create-release:
    needs: [validate, publish-agent, publish-gateway, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping creation."
            exit 0
          fi
          flags=(--title "$TAG" --verify-tag --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$TAG" --repo "$REPO" "${flags[@]}"
