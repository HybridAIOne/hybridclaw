name: Publish Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version tag to publish (e.g. v1.2.3). Must match package.json.
          Leave empty to use the version from package.json.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  # Validate tag/package.json alignment once; both image jobs depend on this.
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      publish_dockerhub: ${{ steps.check.outputs.publish_dockerhub }}
      labels: ${{ steps.check.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate tag and resolve shared metadata
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            EXPECTED_TAG="v$(jq -r .version package.json)"
            TAG="${INPUT_VERSION:-${EXPECTED_TAG}}"
          else
            TAG="${GITHUB_REF_NAME}"
            EXPECTED_TAG="v$(jq -r .version package.json)"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Expected a v-prefixed release tag, got '${TAG}'." >&2
            exit 1
          fi

          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag/package mismatch: tag '${TAG}' != package.json '${EXPECTED_TAG}'." >&2
            exit 1
          fi

          PUBLISH_DOCKERHUB=false
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            PUBLISH_DOCKERHUB=true
          fi

          {
            echo "tag=${TAG}"
            echo "publish_dockerhub=${PUBLISH_DOCKERHUB}"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${TAG}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  # Execution sandbox image — used inside sandboxes for code execution.
  publish-agent:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve agent image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PUBLISH_DOCKERHUB: ${{ needs.validate.outputs.publish_dockerhub }}
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/hybridclaw-agent"
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-agent"
          TAGS="${GHCR_IMAGE}:${TAG}"
          if [[ "${TAG}" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"${GHCR_IMAGE}:latest"
          fi
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:${TAG}"
            if [[ "${TAG}" != *-* ]]; then
              TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./container
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}

  # Gateway image — runs as a permanent claw sandbox (hybridclaw gateway start).
  publish-gateway:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve gateway image tags
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.validate.outputs.tag }}
          PUBLISH_DOCKERHUB: ${{ needs.validate.outputs.publish_dockerhub }}
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/hybridclaw-gateway"
          DOCKERHUB_IMAGE="hybridaione/hybridclaw-gateway"
          TAGS="${GHCR_IMAGE}:${TAG}"
          if [[ "${TAG}" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"${GHCR_IMAGE}:latest"
          fi
          if [[ "${PUBLISH_DOCKERHUB}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:${TAG}"
            if [[ "${TAG}" != *-* ]]; then
              TAGS="${TAGS}"$'\n'"${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          { echo "tags<<EOF"; echo "${TAGS}"; echo "EOF"; } >> "${GITHUB_OUTPUT}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}
