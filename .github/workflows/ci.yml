name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Build Docker images (no push) to catch Dockerfile regressions before merge.
  docker-preflight:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      HAS_HYBRIDAI_API_KEY: ${{ secrets.HYBRIDAI_API_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            context: ./container
            file: ./container/Dockerfile
            target: runtime
            cache_scope: hybridclaw-agent
          - name: gateway
            context: .
            file: ./Dockerfile
            cache_scope: hybridclaw-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: hybridclaw-${{ matrix.name }}:preflight
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,ignore-error=true,timeout=5m,scope=${{ matrix.cache_scope }}

      - name: Setup Node.js workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Gateway e2e tests (local, no API key)
        if: matrix.name == 'gateway'
        env:
          HYBRIDCLAW_RUN_DOCKER_E2E: '1'
          HYBRIDCLAW_E2E_IMAGE: hybridclaw-gateway:preflight
        run: npx vitest run --project e2e tests/gateway-docker.e2e.test.ts

      - name: Gateway e2e tests (external services)
        if: matrix.name == 'gateway' && env.HAS_HYBRIDAI_API_KEY == 'true'
        env:
          HYBRIDCLAW_RUN_DOCKER_E2E: '1'
          HYBRIDCLAW_E2E_IMAGE: hybridclaw-gateway:preflight
          HYBRIDAI_API_KEY: ${{ secrets.HYBRIDAI_API_KEY }}
        run: npx vitest run --project e2e tests/gateway-docker.e2e.test.ts -t "provider|chat API"

      - name: Agent container e2e tests
        if: matrix.name == 'agent'
        env:
          HYBRIDCLAW_RUN_DOCKER_E2E: '1'
          HYBRIDCLAW_E2E_AGENT_IMAGE: hybridclaw-agent:preflight
        run: npx vitest run --project e2e tests/agent-container.e2e.test.ts

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Setup Node.js workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Fetch PR base for dependency policy
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          PARENTS="$(git show -s --format=%P HEAD)"
          BASE_SHA="${PARENTS%% *}"
          BASE_SHA="${BASE_SHA:-${{ github.event.pull_request.base.sha }}}"
          git fetch --no-tags --depth=1 origin "${BASE_SHA}"

      - name: Dependency policy (PR lockfiles)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          PARENTS="$(git show -s --format=%P HEAD)"
          BASE_SHA="${PARENTS%% *}"
          BASE_SHA="${BASE_SHA:-${{ github.event.pull_request.base.sha }}}"
          node ./scripts/check-dependency-policy.mjs --base "${BASE_SHA}"

      - name: Biome check (changed files)
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PARENTS="$(git show -s --format=%P HEAD)"
            BASE_SHA="${PARENTS%% *}"
            BASE_SHA="${BASE_SHA:-${{ github.event.pull_request.base.sha }}}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          HEAD_SHA="${{ github.sha }}"

          FILES=()
          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            while IFS= read -r file; do
              [[ -n "${file}" ]] && FILES+=("${file}")
            done < <(git ls-files src | grep -E '^src/.*\.(ts|tsx|js|jsx)$' || true)
          else
            while IFS= read -r file; do
              [[ -n "${file}" ]] && FILES+=("${file}")
            done < <(
              git diff --name-only --diff-filter=ACMRT "${BASE_SHA}" "${HEAD_SHA}" \
                | grep -E '^src/.*\.(ts|tsx|js|jsx)$' || true
            )
          fi

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No changed source files for Biome check."
            exit 0
          fi

          echo "Running Biome on changed files:"
          printf ' - %s\n' "${FILES[@]}"
          npx biome check "${FILES[@]}"

      - name: TypeScript lint (root)
        run: npm run lint

      - name: TypeScript lint (container)
        run: npm --prefix container run lint

      - name: TypeScript lint (console)
        run: npm --prefix console run typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_HYBRIDAI_API_KEY: ${{ secrets.HYBRIDAI_API_KEY != '' }}
      HAS_HYBRIDAI_CHATBOT_ID: ${{ secrets.HYBRIDAI_CHATBOT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Setup Node.js workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Build release artifacts
        run: npm run build

      - name: Trace judge eval gate
        run: npm run eval:trace-judge:gate

      - name: Trace judge live accuracy gate
        if: env.HAS_HYBRIDAI_API_KEY == 'true' && env.HAS_HYBRIDAI_CHATBOT_ID == 'true'
        env:
          HYBRIDAI_API_KEY: ${{ secrets.HYBRIDAI_API_KEY }}
          HYBRIDAI_CHATBOT_ID: ${{ secrets.HYBRIDAI_CHATBOT_ID }}
          HYBRIDCLAW_TRACE_JUDGE_EVAL_MODEL: ${{ vars.HYBRIDCLAW_TRACE_JUDGE_EVAL_MODEL || 'hybridai/gpt-4.1-mini' }}
        run: npm run eval:trace-judge:gate:live

      - name: Trace judge live accuracy gate skipped
        if: env.HAS_HYBRIDAI_API_KEY != 'true' || env.HAS_HYBRIDAI_CHATBOT_ID != 'true'
        run: echo "Skipping live trace-judge gate because HYBRIDAI_API_KEY and HYBRIDAI_CHATBOT_ID are not both available to this run."

      - name: Release bundle check (root)
        run: npm run release:check

      - name: Release bundle check (container)
        run: npm --prefix container run release:check

      - name: Integration tests
        run: npx vitest run --project integration

      - name: Unit tests with coverage
        run: npx vitest run --coverage --project unit

      - name: Frontend unit tests (console)
        run: npm run test:console

      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PCT=$(node -e "
            const s = require('./coverage/coverage-summary.json').total.lines;
            console.log(Math.round(s.pct));
          ")
          COLOR="red"
          if [ "$PCT" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 60 ]; then COLOR="green"
          elif [ "$PCT" -ge 40 ]; then COLOR="yellowgreen"
          elif [ "$PCT" -ge 20 ]; then COLOR="yellow"
          fi
          mkdir -p badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > badge/coverage.json

      - name: Publish coverage badge to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badge
          destination_dir: badge
          keep_files: true

  npm-e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Setup Node.js workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Build release artifacts
        run: npm run build

      - name: npm install journey e2e
        env:
          HYBRIDCLAW_RUN_NPM_E2E: '1'
        run: npx vitest run --project e2e tests/npm-install.e2e.test.ts
