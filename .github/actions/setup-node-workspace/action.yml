name: Setup Node.js workspace
description: Set up Node.js with npm cache, install root and container dependencies.

inputs:
  node-version:
    description: Node.js version to use.
    default: '22'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: |
          npm-shrinkwrap.json
          package-lock.json
          container/npm-shrinkwrap.json
          container/package-lock.json
          console/package-lock.json
          plugins/whatsapp/npm-shrinkwrap.json
          plugins/whatsapp/package-lock.json

    - name: Use npm 11
      shell: bash
      run: npm install --global npm@11.10.0 --ignore-scripts --no-audit --fund=false

    - name: Install root dependencies
      shell: bash
      env:
        ONNXRUNTIME_NODE_INSTALL_CUDA: skip
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      run: npm ci --ignore-scripts --no-audit --fund=false

    - name: Rebuild reviewed native dependencies
      shell: bash
      run: npm rebuild better-sqlite3 --ignore-scripts=false --no-audit --fund=false

    - name: Install container dependencies
      shell: bash
      run: npm --prefix container ci --ignore-scripts --no-audit --fund=false

    - name: Install WhatsApp plugin dependencies
      shell: bash
      run: npm --prefix plugins/whatsapp ci --ignore-scripts --no-audit --fund=false

    - name: Verify npm registry signatures
      shell: bash
      run: npm run audit:signatures
