id: brevo-email
name: Brevo Email
version: 0.1.0
kind: channel
description: Per-agent email addresses via Brevo inbound parsing webhook and SMTP relay.
entrypoint: src/index.js
requires:
  env:
    - BREVO_SMTP_LOGIN
    - BREVO_SMTP_KEY
    - BREVO_WEBHOOK_SECRET
    - HYBRIDAI_API_KEY
configSchema:
  type: object
  additionalProperties: false
  properties:
    domain:
      type: string
      default: agent.hybridai.one
    fromName:
      type: string
      default: ''
    fromAddress:
      type: string
      default: ''
    smtpHost:
      type: string
      default: smtp-relay.brevo.com
    smtpPort:
      type: number
      default: 587
    maxBodyBytes:
      type: number
      default: 10485760
      minimum: 1024
      maximum: 52428800
    agentHandles:
      type: object
      default: {}
      additionalProperties:
        type: string
configUiHints:
  domain:
    label: Email Domain
    placeholder: agent.hybridai.one
    help: The domain used for agent email addresses ({handle-or-agentId}@domain).
  fromName:
    label: From Display Name
    placeholder: HybridClaw Agent
    help: Display name in the From header (e.g. "HybridClaw Agent"). Leave empty to use the agent ID.
  fromAddress:
    label: From Address Override
    placeholder: agent@mail.hybridclaw.io
    help: Override the From email address. Leave empty to use the assigned handle or {agentId}@domain.
